version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: biovault-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biovault-backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/biovault
      - NODE_ENV=development
      - PORT=5000
      - JWT_SECRET=dev_secret_change_in_production
      - JWT_EXPIRES_IN=7d
      - WEBAUTHN_RP_NAME=BioVault
      - WEBAUTHN_RP_ID=supereminent-lithographically-deloris.ngrok-free.dev
      - WEBAUTHN_ORIGIN=https://supereminent-lithographically-deloris.ngrok-free.dev
      - NETWORK_RPC_URL=
    env_file:
      - ./backend/.env
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./circuits:/app/circuits:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biovault-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
